server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Intenta servir el archivo solicitado, si no existe, sirve index.html
        try_files $uri $uri/ /index.html;
    }

    # --- PWA: archivos de nombre ESTABLE que NO deben cachearse ---------------
    # Estos no llevan hash en el nombre, así que si se cachean el navegador no se
    # entera de un nuevo deploy. Los `location =` (match exacto) tienen prioridad
    # sobre la regla regex de abajo, por lo que ganan sin importar el orden.

    # Service worker: debe revalidarse SIEMPRE para que la actualización se
    # detecte de inmediato (junto con los chequeos en registerServiceWorker.ts).
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # SW de notificaciones push (Firebase) — mismo motivo.
    location = /firebase-messaging-sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # index.html es el entry point: revalidar siempre para recoger los nuevos
    # hashes de assets tras un deploy (try_files lo sirve para todas las rutas SPA).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # Manifiesto PWA: nombre estable, debe revalidarse.
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        expires off;
    }

    # Caché agresiva para estáticos con hash en el nombre (js, css, imágenes).
    # Su contenido es inmutable: si cambia, cambia el nombre del archivo.
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?)$ {
        expires max;
        add_header Pragma public;
        add_header Cache-Control "public, must-revalidate, proxy-revalidate";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}