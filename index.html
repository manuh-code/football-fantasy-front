    <!-- Aplica el tema (clase .dark) antes del primer paint para que el splash
         y la app no hagan flash de color. Idempotente con themeStore.initTheme(). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var dark = t
            ? t === "dark"
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <!-- Splash screen: estilos inline para que se muestren al instante, sin
         depender del bundle CSS. Se desvanece desde src/main.ts al montar la app. -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #f9fafb;
        transition: opacity 0.3s ease;
        font-family:
          -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }
      html.dark #app-splash {
        background: #111827;
      }
      #app-splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
      .app-splash__logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: linear-gradient(135deg, #3b82f6, #4f46e5);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.45);
      }
      .app-splash__name {
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: #111827;
      }
      html.dark .app-splash__name {
        color: #ffffff;
      }
      .app-splash__spinner {
        width: 24px;
        height: 24px;
        border: 3px solid rgba(59, 130, 246, 0.2);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: app-splash-spin 0.8s linear infinite;
      }
      @keyframes app-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-splash__spinner {
          animation: none;
        }
      }
    </style>
  </head>
